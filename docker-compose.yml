services:
  vcu-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vcu-fastapi
    restart: unless-stopped
    environment:
      FLASH_SIMULATE: "0"
      FLASH_REQUIRE_IMD_CONFIRM: "0"
      FLASH_DO_ERASE: "1"
      VCU_HOST: "0.0.0.0"
      VCU_PORT: "8000"
      ALLOWED_ORIGINS: "http://localhost:8000,http://127.0.0.1:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db
